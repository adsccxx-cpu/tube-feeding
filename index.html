<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管灌營養配方計算系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary-color: #3498db; --secondary-color: #2ecc71; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 800px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; }
        
        h2, h3 { color: #2c3e50; border-left: 5px solid var(--primary-color); padding-left: 10px; margin-top: 20px; }
        
        /* 基本資料區 */
        .info-input { margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; }
        .info-input label { font-weight: bold; width: 100%; }
        input[type="text"], input[type="number"], input[type="date"] { 
            padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; width: 100%; box-sizing: border-box;
        }

        /* 表格優化：讓手機好操作 */
        .table-container { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background-color: var(--primary-color); color: white; padding: 12px 8px; font-size: 14px; }
        td { border: 1px solid #eee; padding: 8px; }
        
        /* 縮小輸入框在表格內的寬度，避免互擠 */
        td input { text-align: center; border: none; background: #f9f9f9; padding: 8px 4px; }

        .btn { border: none; border-radius: 8px; color: white; padding: 12px 20px; font-size: 16px; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; }
        .btn-add { background-color: var(--secondary-color); }
        .btn-qr { background-color: #9b59b6; }
        .btn-img { background-color: #e67e22; }
        .btn-del { background-color: #e74c3c; padding: 5px 10px; font-size: 12px; }

        .memo-section label { display: flex; align-items: center; background: #f8f9fa; padding: 12px; margin-bottom: 8px; border-radius: 6px; cursor: pointer; }
        .memo-section input { margin-right: 10px; transform: scale(1.3); }

        .symptom-box { background: #fff8e1; border: 1px solid #ffe082; padding: 15px; border-radius: 8px; font-size: 14px; color: #795548; }

        #qrcode { margin: 20px 0; text-align: center; display: flex; flex-direction: column; align-items: center; }

        /* 列印調整 */
        @media print { .no-print { display: none !important; } .container { box-shadow: none; padding: 0; } }
    </style>
</head>
<body>

<div class="container" id="capture-area">
    <h2>管灌營養配方單</h2>
    
    <div class="section info-input">
        <label>配方名稱：<input type="text" id="formulaName" placeholder="例如：亞培完膳 250ml"></label>
        <label>日期：<input type="date" id="reportDate"></label>
    </div>

    <div class="section">
        <h3>配方劑量時間表</h3>
        <div class="table-container">
            <table id="scheduleTable">
                <thead>
                    <tr>
                        <th width="20%">時間</th>
                        <th width="35%">品項</th>
                        <th width="20%">ml</th>
                        <th width="20%">水</th>
                        <th width="5%" class="no-print">X</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="text" value="08:00"></td>
                        <td><input type="text" value="完膳"></td>
                        <td><input type="number" value="250"></td>
                        <td><input type="number" value="50"></td>
                        <td class="no-print"><button class="btn-del" onclick="deleteRow(this)">刪</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <button class="btn btn-add no-print" onclick="addRow()">+ 新增時段</button>
    </div>

    <div class="section memo-section">
        <h3>臨床備註</h3>
        <label><input type="checkbox"> 血糖高：請定期監測血糖</label>
        <label><input type="checkbox"> 電解質不平衡：注意鈉鉀磷攝取</label>
        <label><input type="checkbox"> 水量限制：總入水量須包含沖管水</label>
    </div>

    <div class="section">
        <h3>管灌症狀處理</h3>
        <div class="symptom-box">
            <b>● 腹瀉：</b>檢查灌食速度與配方溫度。<br>
            <b>● 腹脹/嘔吐：</b>床頭抬高 45 度，監測胃殘餘量。
        </div>
    </div>

    <div id="qrcode"></div>
</div>

<div class="no-print" style="margin-top: 20px; padding: 0 10px;">
    <button class="btn btn-qr" onclick="generateQRCode()">1. 生成 QR Code</button>
    <button class="btn btn-img" onclick="downloadImage()">2. 下載配方圖片</button>
    <button class="btn" style="background:#34495e" onclick="window.print()">3. 列印/轉PDF</button>
</div>

<script>
    document.getElementById('reportDate').valueAsDate = new Date();

    function addRow() {
        const table = document.getElementById("scheduleTable").getElementsByTagName('tbody')[0];
        const newRow = table.insertRow();
        newRow.innerHTML = `
            <td><input type="text" value="12:00"></td>
            <td><input type="text" placeholder="品項"></td>
            <td><input type="number" value="250"></td>
            <td><input type="number" value="50"></td>
            <td class="no-print"><button class="btn-del" onclick="deleteRow(this)">刪</button></td>
        `;
    }

    function deleteRow(btn) { btn.parentNode.parentNode.remove(); }

    function generateQRCode() {
        const qrContainer = document.getElementById("qrcode");
        qrContainer.innerHTML = "<p style='font-size:12px; color:#666;'>掃描查看線上版</p>";
        new QRCode(qrContainer, {
            text: window.location.href, // 掃碼後會連回到你的網頁網址
            width: 120,
            height: 120
        });
    }

    function downloadImage() {
        const captureArea = document.getElementById('capture-area');
        html2canvas(captureArea, { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = '管灌配方單.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
</script>

</body>
</html>
